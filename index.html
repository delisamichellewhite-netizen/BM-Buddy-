<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>BM Buddy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f4ff; font-family: 'Nunito', system-ui, sans-serif; }
#root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
textarea, input { font-family: inherit; }
.sync-banner { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px; text-align: center; padding: 8px;
  font-size: 12px; font-weight: 700; z-index: 100; transition: all 0.3s; }
.sync-ok { background: #4caf50; color: white; }
.sync-err { background: #e85a5a; color: white; }
.sync-busy { background: #4A90D9; color: white; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
 
// ─── SUPABASE CONFIG ────────────────────────────────────────
// ⚠️ REPLACE these two values after you create your Supabase project
const SUPABASE_URL = "YOUR_SUPABASE_URL";
const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
const FAMILY_ID = "white-family"; // shared key — same on both phones
 
// Only create the Supabase client if real credentials have been filled in.
// Passing "YOUR_SUPABASE_URL" to createClient throws "Invalid URL" and
// crashes the entire app before React mounts. This keeps the app running
// in local-storage-only mode until real credentials are provided.
const SUPABASE_CONFIGURED = SUPABASE_URL !== "YOUR_SUPABASE_URL"
  && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY";
const sb = SUPABASE_CONFIGURED
  ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;
 
// ─── CONSTANTS ──────────────────────────────────────────────
const KIDS = [
  { id: "alexander", name: "Alexander", age: 5, emoji: "🦁", color: "#4A90D9" },
  { id: "baby",      name: "Archie",    age: 2, emoji: "🐻", color: "#E8845A" },
];
const CONSISTENCY = [
  { id: "hard",  label: "Hard",  emoji: "🪨", desc: "Pebbles / dry" },
  { id: "firm",  label: "Firm",  emoji: "🟤", desc: "Well-formed, easy" },
  { id: "soft",  label: "Soft",  emoji: "💧", desc: "Soft, mushy" },
  { id: "loose", label: "Loose", emoji: "🌊", desc: "Loose / watery" },
];
const LOCATION = [
  { id: "toilet",          label: "Toilet",             emoji: "🚽" },
  { id: "accident_home",   label: "Accident at Home",   emoji: "🏠" },
  { id: "accident_school", label: "Accident at School", emoji: "🏫" },
  { id: "accident_wild",   label: "Accident Out",       emoji: "🌍" },
  { id: "diaper",          label: "Diaper",             emoji: "🍼" },
];
const ACCIDENT_IDS = ["accident_home","accident_school","accident_wild"];
const SIZE = [
  { id: "small",  label: "Small",  emoji: "🔹" },
  { id: "medium", label: "Medium", emoji: "🔷" },
  { id: "large",  label: "Large",  emoji: "💎" },
];
const SYMPTOMS = [
  "Stomach ache","Gas","Bloating","Refused food",
  "Cranky","Backed up feel","Straining","Blood noted",
];
const ENEMA_TYPES = [
  { id: "saline",   label: "Saline Fleet" },
  { id: "glycerin", label: "Glycerin suppository" },
  { id: "mineral",  label: "Mineral oil" },
  { id: "other",    label: "Other" },
];
const URINE_COLOR = [
  { id: "clear",  label: "Clear",         emoji: "💧", desc: "Well hydrated" },
  { id: "pale",   label: "Pale yellow",   emoji: "🌕", desc: "Good" },
  { id: "yellow", label: "Dark yellow",   emoji: "🟡", desc: "Mild dehydration" },
  { id: "amber",  label: "Amber/Orange",  emoji: "🟠", desc: "Dehydrated" },
  { id: "pink",   label: "Pink/Red",      emoji: "🔴", desc: "Blood — note!" },
];
const URINE_LOCATION = [
  { id: "toilet",          label: "Toilet",             emoji: "🚽" },
  { id: "accident_home",   label: "Accident at Home",   emoji: "🏠" },
  { id: "accident_school", label: "Accident at School", emoji: "🏫" },
  { id: "accident_wild",   label: "Accident Out",       emoji: "🌍" },
  { id: "diaper",          label: "Diaper",             emoji: "🍼" },
];
 
// ─── LOCAL CACHE ─────────────────────────────────────────────
const KEY = "bm_buddy_v4";
function loadLocal() {
  try {
    const r = localStorage.getItem(KEY);
    const d = r ? JSON.parse(r) : {};
    return { entries: d.entries||[], enemas: d.enemas||[], contacts: d.contacts||[], urine: d.urine||[] };
  } catch { return { entries:[], enemas:[], contacts:[], urine:[] }; }
}
function saveLocal(d) { try { localStorage.setItem(KEY, JSON.stringify(d)); } catch {} }
 
// ─── HELPERS ─────────────────────────────────────────────────
const fmt  = iso => new Date(iso).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const fmtT = iso => new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
function daysSince(iso) {
  if (!iso) return null;
  const h = Math.floor((Date.now()-new Date(iso))/3600000);
  if (h<1) return "< 1h ago";
  if (h<24) return `${h}h ago`;
  const d = Math.floor(h/24);
  return d===1?"1 day ago":`${d} days ago`;
}
function dayCount(iso) {
  if (!iso) return null;
  return Math.floor((Date.now()-new Date(iso))/86400000);
}
 
// ─── REPORTS ─────────────────────────────────────────────────
function buildGIReport(entries, enemas, urine, kidId) {
  const k  = KIDS.find(k=>k.id===kidId);
  const ke = [...entries].filter(e=>e.kidId===kidId).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const en = [...enemas ].filter(e=>e.kidId===kidId).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  const ur = [...urine  ].filter(e=>e.kidId===kidId).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
 
  let t = `HEALTH LOG — ${k.name.toUpperCase()} (Age ${k.age}) | Celiac Disease\n`;
  t += `Generated: ${new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n`;
  t += "=".repeat(52)+"\n\n";
 
  if (!ke.length) { t+="No BM entries yet.\n\n"; }
  else {
    t+=`BOWEL MOVEMENTS (${ke.length})\n${"-".repeat(40)}\n`;
    ke.forEach((e,i)=>{
      const loc=LOCATION.find(l=>l.id===e.location);
      const con=CONSISTENCY.find(c=>c.id===e.consistency);
      const sz =SIZE.find(s=>s.id===e.size);
      t+=`\n[${i+1}] ${fmt(e.timestamp)} at ${fmtT(e.timestamp)}\n`;
      t+=`    Location: ${loc?.label||"—"}\n`;
      t+=`    Consistency: ${con?.label||"—"} (${con?.desc||""})\n`;
      if(sz) t+=`    Size: ${sz.label}\n`;
      if(e.symptoms?.length) t+=`    Symptoms: ${e.symptoms.join(", ")}\n`;
      if(e.notes) t+=`    Notes: ${e.notes}\n`;
    });
  }
 
  if(ur.length){
    t+=`\nURINE (${ur.length})\n${"-".repeat(40)}\n`;
    ur.forEach((e,i)=>{
      const col=URINE_COLOR.find(c=>c.id===e.color);
      const loc=URINE_LOCATION.find(l=>l.id===e.location);
      t+=`\n[${i+1}] ${fmt(e.timestamp)} at ${fmtT(e.timestamp)}\n`;
      t+=`    Location: ${loc?.label||"—"}\n`;
      t+=`    Color: ${col?.label||"—"} — ${col?.desc||""}\n`;
      if(e.notes) t+=`    Notes: ${e.notes}\n`;
    });
  }
 
  if(en.length){
    t+=`\nINTERVENTIONS (${en.length})\n${"-".repeat(40)}\n`;
    en.forEach((e,i)=>{
      const type=ENEMA_TYPES.find(x=>x.id===e.type);
      t+=`\n[${i+1}] ${fmt(e.timestamp)} at ${fmtT(e.timestamp)}\n`;
      t+=`    Type: ${type?.label||e.type}\n`;
      t+=`    Result: ${e.result||"—"}\n`;
      if(e.notes) t+=`    Notes: ${e.notes}\n`;
    });
  }
 
  const acc=ke.filter(e=>ACCIDENT_IDS.includes(e.location)).length;
  const urAcc=ur.filter(e=>ACCIDENT_IDS.includes(e.location)).length;
  const hard=ke.filter(e=>e.consistency==="hard").length;
  t+=`\nSUMMARY\n${"-".repeat(40)}\n`;
  t+=`Total BMs: ${ke.length} | BM Accidents: ${acc} | Hard/constipated: ${hard}\n`;
  t+=`Total Urine: ${ur.length} | Urine Accidents: ${urAcc} | Interventions: ${en.length}\n`;
  return t;
}
 
function buildSchoolMsg(entries, enemas, period, contact) {
  const now=new Date(), cutoff=new Date(now);
  if(period==="today") cutoff.setHours(0,0,0,0);
  else if(period==="3days") cutoff.setDate(now.getDate()-3);
  else cutoff.setDate(now.getDate()-7);
 
  const ke=entries.filter(e=>e.kidId==="alexander"&&new Date(e.timestamp)>=cutoff);
  const en=enemas.filter(e=>e.kidId==="alexander"&&new Date(e.timestamp)>=cutoff);
  const acc=ke.filter(e=>ACCIDENT_IDS.includes(e.location));
  const allKe=entries.filter(e=>e.kidId==="alexander").sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
  const lb=allKe[0];
 
  const pLabel=period==="today"?"today":period==="3days"?"over the past 3 days":"this past week";
  const who=contact.role==="nurse"?`School Nurse ${contact.name}`:`${contact.name}`;
 
  let m=`Hi ${who},\n\n`;
  m+=`I wanted to give you a quick health update on Alexander (celiac disease) ${pLabel}.\n\n`;
 
  if(!ke.length){
    m+=`We have no bowel movement activity recorded at home ${pLabel}`;
    m+=lb?` — his last recorded movement was ${daysSince(lb.timestamp)}.`:".";
    m+=" This may mean he is experiencing constipation, and we are monitoring closely.\n\n";
  } else {
    m+=`Alexander had ${ke.length} bowel movement${ke.length>1?"s":""} at home ${pLabel}. `;
    if(lb) m+=`His most recent was ${daysSince(lb.timestamp)}. `;
    if(acc.length){
      const atSchool=acc.filter(e=>e.location==="accident_school").length;
      const atHome  =acc.filter(e=>e.location==="accident_home").length;
      const out     =acc.filter(e=>e.location==="accident_wild").length;
      const parts=[];
      if(atHome)   parts.push(`${atHome} at home`);
      if(atSchool) parts.push(`${atSchool} at school`);
      if(out)      parts.push(`${out} out in the community`);
      m+=`\n\n⚠️ He had ${acc.length} accident${acc.length>1?"s":""} during this period (${parts.join(", ")}). `;
      m+="Please allow him bathroom access without needing to ask, and keep a change of clothes available if possible.\n\n";
    } else { m+="No accidents recorded during this period.\n\n"; }
  }
 
  if(en.length){
    const last=en[en.length-1];
    const ltype=ENEMA_TYPES.find(t=>t.id===last.type);
    m+=`We used a bowel intervention (${ltype?.label||"enema"}) recently. His digestion may be adjusting — please watch for discomfort or urgency at school.\n\n`;
  }
 
  m+="As a reminder, Alexander has celiac disease and must maintain a strictly gluten-free diet. ";
  m+="Please do not allow him to share food, utensils, or eat anything not sent from home.\n\n";
 
  if(contact.role==="nurse"){
    m+="If he reports stomach pain, urgency, or has an accident at school, please feel free to contact me directly. I can share his full health log if helpful for your records.\n\n";
  } else {
    m+="If you notice any discomfort, accidents, or food-related incidents, please let me know. Thank you for caring for him!\n\n";
  }
 
  m+="Warm regards,\nDeLisa White";
  if(contact.phone) m+=`\n${contact.phone}`;
  return m;
}
 
// ─── UI PRIMITIVES ───────────────────────────────────────────
function Lbl({children}) {
  return <div style={{fontWeight:800,fontSize:11,color:"#555",marginBottom:7,textTransform:"uppercase",letterSpacing:0.7}}>{children}</div>;
}
function Tag({color,children}) {
  return <span style={{background:color+"18",color,border:`1px solid ${color}44`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,display:"inline-block",marginBottom:2}}>{children}</span>;
}
function Pill({active,color="#4A90D9",onClick,children,style:s={}}) {
  return <button onClick={onClick} style={{padding:"7px 13px",borderRadius:20,border:`2px solid ${active?color:"#e0e0e0"}`,background:active?color:"white",color:active?"white":"#555",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",...s}}>{children}</button>;
}
function Card({children,accent,style:s={}}) {
  return <div style={{background:"white",borderRadius:16,padding:15,marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",border:`2px solid ${accent||"#eef0f7"}`,...s}}>{children}</div>;
}
function BigBtn({onClick,disabled,color="#4A90D9",children}) {
  return <button onClick={onClick} disabled={!!disabled} style={{width:"100%",padding:13,background:disabled?"#ccc":color,color:"white",border:"none",borderRadius:13,fontWeight:800,fontSize:14,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>{children}</button>;
}
function TxtInput({value,onChange,placeholder,style:s={},multiline}) {
  const base={width:"100%",boxSizing:"border-box",border:"2px solid #e0e0e0",borderRadius:11,padding:"9px 12px",fontSize:13,fontFamily:"inherit",color:"#333",outline:"none",...s};
  return multiline
    ? <textarea value={value} onChange={onChange} placeholder={placeholder} style={{...base,resize:"vertical",minHeight:68}} />
    : <input value={value} onChange={onChange} placeholder={placeholder} style={base} />;
}
 
// ─── MAIN APP ────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(loadLocal);
  const [syncStatus, setSyncStatus] = useState(""); // "ok"|"err"|"busy"|""
  const [syncMsg, setSyncMsg] = useState("");
  const [configured, setConfigured] = useState(SUPABASE_CONFIGURED);
  const syncTimer = useRef(null);
 
  const {entries, enemas, contacts, urine} = data;
 
  // ── Save locally on every change ──
  useEffect(() => { saveLocal(data); }, [data]);
 
  // ── Pull from Supabase on mount ──
  useEffect(() => {
    if (!configured || !sb) return;
    pullFromSupabase();
 
    // Real-time subscription
    const channel = sb.channel("bm-buddy-realtime")
      .on("postgres_changes", { event: "*", schema: "public", table: "bm_buddy_data", filter: `family_id=eq.${FAMILY_ID}` },
        () => { pullFromSupabase(); })
      .subscribe();
 
    return () => sb.removeChannel(channel);
  }, [configured]);
 
  async function pullFromSupabase() {
    if (!sb) return;
    try {
      const { data: rows, error } = await sb
        .from("bm_buddy_data")
        .select("payload")
        .eq("family_id", FAMILY_ID)
        .single();
      if (error && error.code !== "PGRST116") throw error;
      if (rows?.payload) {
        const remote = rows.payload;
        setData(remote);
        saveLocal(remote);
      }
    } catch(e) {
      console.warn("Pull failed", e);
    }
  }
 
  async function pushToSupabase(newData) {
    if (!configured || !sb) return;
    showSync("busy", "Syncing…");
    try {
      const { error } = await sb
        .from("bm_buddy_data")
        .upsert({ family_id: FAMILY_ID, payload: newData, updated_at: new Date().toISOString() },
                { onConflict: "family_id" });
      if (error) throw error;
      showSync("ok", "Synced ✓");
    } catch(e) {
      showSync("err", "Sync failed — saved locally");
      console.warn("Push failed", e);
    }
  }
 
  function showSync(status, msg) {
    setSyncStatus(status); setSyncMsg(msg);
    clearTimeout(syncTimer.current);
    syncTimer.current = setTimeout(() => setSyncStatus(""), 3000);
  }
 
  function patch(p) {
    const next = { ...data, ...p };
    setData(next);
    pushToSupabase(next);
  }
 
  const [view, setView] = useState("today");
  const [saved, setSaved] = useState(false);
  const [copied, setCopied] = useState("");
  const [addMode, setAddMode] = useState("bm");
  const [schoolTab, setSchoolTab] = useState("contacts");
  const [exportKid, setExportKid] = useState("alexander");
  const [msgTarget, setMsgTarget] = useState(null);
  const [msgPeriod, setMsgPeriod] = useState("today");
  const [genMsg, setGenMsg] = useState("");
 
  const blankBM    = {kidId:"alexander",consistency:"",location:"",size:"",symptoms:[],notes:"",timestamp:new Date().toISOString()};
  const blankEnema = {kidId:"alexander",type:"",result:"",notes:"",timestamp:new Date().toISOString()};
  const blankUrine = {kidId:"alexander",color:"",location:"",notes:"",timestamp:new Date().toISOString()};
  const [form, setForm]   = useState(blankBM);
  const [eForm, setEForm] = useState(blankEnema);
  const [uForm, setUForm] = useState(blankUrine);
  const [cForm, setCForm] = useState({name:"",role:"teacher",email:"",phone:""});
 
  function flash() {
    setSaved(true);
    setTimeout(()=>{ setSaved(false); setView("today"); setForm({...blankBM,timestamp:new Date().toISOString()}); setEForm({...blankEnema,timestamp:new Date().toISOString()}); setUForm({...blankUrine,timestamp:new Date().toISOString()}); }, 1300);
  }
 
  const todayStr = new Date().toDateString();
  const todayAll = entries.filter(e=>new Date(e.timestamp).toDateString()===todayStr);
  function lastBM(kidId) { return entries.filter(e=>e.kidId===kidId).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0]; }
 
  function doCopy(text,key) {
    navigator.clipboard?.writeText(text).catch(()=>{});
    setCopied(key); setTimeout(()=>setCopied(""),2200);
  }
 
  const allHistory = [
    ...entries.map(e=>({...e,_t:"bm"})),
    ...enemas.map(e=>({...e,_t:"enema"})),
    ...urine.map(e=>({...e,_t:"urine"})),
  ].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
 
  return (
    <div style={{fontFamily:"'Nunito',system-ui,sans-serif",background:"linear-gradient(135deg,#f0f4ff 0%,#fef9f0 100%)",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:80}}>
      {/* Sync banner */}
      {syncStatus && (
        <div className={`sync-banner sync-${syncStatus}`}>{syncMsg}</div>
      )}
 
      {/* Supabase not configured warning */}
      {!configured && (
        <div style={{background:"#fff3cd",borderBottom:"2px solid #ffc107",padding:"10px 16px",fontSize:12,color:"#856404",fontWeight:700}}>
          ⚠️ Supabase not configured — data saves locally only. See README to enable sync.
        </div>
      )}
 
      {/* Header */}
      <div style={{background:"white",borderBottom:"2px solid #eef0f7",padding:"15px 18px 11px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:26}}>🚽</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:17,color:"#1a1a2e",letterSpacing:-0.5}}>BM Buddy</div>
            <div style={{fontSize:11,color:"#888",fontWeight:600}}>Celiac tracker · {todayAll.length} logged today</div>
          </div>
          {configured && <span style={{fontSize:11,color:"#4caf50",fontWeight:700}}>☁️ Synced</span>}
        </div>
      </div>
 
      {/* Nav */}
      <div style={{display:"flex",background:"white",borderBottom:"2px solid #eef0f7",position:"sticky",top:63,zIndex:9}}>
        {[
          {id:"today",  label:"📋 Today"},
          {id:"add",    label:"➕ Log"},
          {id:"history",label:"📅 History"},
          {id:"school", label:"🏫 School"},
          {id:"export", label:"📤 Export"},
        ].map(tab=>(
          <button key={tab.id} onClick={()=>setView(tab.id)} style={{flex:1,padding:"10px 2px",background:view===tab.id?"#4A90D9":"transparent",color:view===tab.id?"white":"#666",border:"none",fontWeight:700,fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>{tab.label}</button>
        ))}
      </div>
 
      <div style={{padding:"16px 13px"}}>
 
        {/* ══ TODAY ══ */}
        {view==="today" && (
          <>
            <div style={{fontWeight:800,fontSize:15,color:"#1a1a2e",marginBottom:13}}>
              {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
            </div>
            {KIDS.map(k=>{
              const todayKid = todayAll.filter(e=>e.kidId===k.id);
              const accidents = todayKid.filter(e=>ACCIDENT_IDS.includes(e.location)).length;
              const lb = lastBM(k.id);
              const dc = dayCount(lb?.timestamp);
              const uc = dc===null?"#aaa":dc>=2?"#e85a5a":dc===1?"#E8845A":"#4caf50";
              const todayEn = enemas.filter(e=>e.kidId===k.id&&new Date(e.timestamp).toDateString()===todayStr);
              const todayUrine = urine.filter(e=>e.kidId===k.id&&new Date(e.timestamp).toDateString()===todayStr);
              const urineAcc = todayUrine.filter(e=>ACCIDENT_IDS.includes(e.location)).length;
              const totalAcc = accidents + urineAcc;
              return (
                <Card key={k.id} accent={k.color+"33"}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <span style={{fontSize:26}}>{k.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:14,color:"#1a1a2e"}}>{k.name}</div>
                      <div style={{fontSize:12,color:"#888"}}>
                        Age {k.age} · {todayKid.length} BM{todayKid.length!==1?"s":""} · {todayUrine.length} urine today
                        {totalAcc>0&&<span style={{color:"#e85a5a",fontWeight:700}}> · {totalAcc} accident{totalAcc>1?"s":""}</span>}
                      </div>
                    </div>
                    <div style={{background:uc+"18",border:`1.5px solid ${uc}`,borderRadius:10,padding:"4px 8px",textAlign:"center",minWidth:68}}>
                      <div style={{fontSize:9,fontWeight:800,color:uc,textTransform:"uppercase",letterSpacing:0.3}}>Last BM</div>
                      <div style={{fontSize:11,fontWeight:800,color:uc}}>{daysSince(lb?.timestamp)||"None"}</div>
                    </div>
                  </div>
                  {todayKid.length===0&&todayEn.length===0&&todayUrine.length===0
                    ? <div style={{color:"#bbb",fontSize:13,fontStyle:"italic"}}>Nothing logged today</div>
                    : <>
                      {todayKid.map(e=>{

              <pre style={{fontSize:11,color:"#444",whiteSpace:"pre-wrap",lineHeight:1.5,background:"#f8f9ff",borderRadius:10,padding:12,margin:0,maxHeight:300,overflowY:"auto"}}>
{buildGIReport(entries,enemas,urine,exportKid)}
              </pre>
            </Card>
          </>
        )}
 
      </div>
    </div>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
